name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  apply-create-abx:
    if: github.head_ref == 'agent/2d2-create-abx-implementation' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/2d2-create-abx-implementation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply bounded source patch
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY' > /tmp/apply-create-abx.log 2>&1
          from pathlib import Path
          import base64
          import gzip

          workflow = Path('.github/workflows/apply-2d2-create-abx.yml').read_text()
          payload = workflow.split("echo '", 1)[1].split("' | base64", 1)[0]
          script = gzip.decompress(base64.b64decode(payload)).decode()
          exec(compile(script, '/tmp/apply_create_abx.py', 'exec'))
          PY
      - name: Upload patch diagnostic
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: apply-create-abx-diagnostic
          path: /tmp/apply-create-abx.log
      - name: Stop after patch failure
        if: steps.apply.outcome == 'failure'
        shell: bash
        run: |
          tail -80 /tmp/apply-create-abx.log
          exit 1
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - name: Commit implementation and remove temporary automation
        shell: bash
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/apply-2d2-create-abx.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement accepted A+B+X create slice"
          git push origin HEAD:agent/2d2-create-abx-implementation

  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.scope.outputs.code }}
      e2e: ${{ steps.scope.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="${GITHUB_SHA}^"
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          code=false
          e2e=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "$file"

            case "$file" in
              *.md) ;;
              *) code=true ;;
            esac

            case "$file" in
              src/* | e2e/* | public/* | index.html | package.json | package-lock.json | playwright.config.* | vite.config.* | .github/workflows/*)
                e2e=true
                ;;
            esac
          done <<< "$changed_files"

          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test

  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
