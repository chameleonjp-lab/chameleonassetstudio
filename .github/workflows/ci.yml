name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.scope.outputs.code }}
      e2e: ${{ steps.scope.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="${GITHUB_SHA}^"
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          code=false
          e2e=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "$file"

            case "$file" in
              *.md) ;;
              *) code=true ;;
            esac

            case "$file" in
              src/* | e2e/* | public/* | index.html | package.json | package-lock.json | playwright.config.* | vite.config.* | .github/workflows/*)
                e2e=true
                ;;
            esac
          done <<< "$changed_files"

          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply targeted call-site fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          home = Path('src/features/home/HomeScreen.tsx')
          text = home.read_text()
          old = """      const assetIdMap = new Map(bundle.assets.map((asset) => [asset.id, generateId('asset')]));
          const project = {
            ...bundle.project,
            // asset 本体（assets/*/asset.json）が無い entry は dangling になるため除外する
            id: generateId('project'),
            assets: bundle.project.assets
              .filter((entry) => assetIdMap.has(entry.id))
              .map((entry) => ({
                ...entry,
                id: assetIdMap.get(entry.id)!,
              })),
          };
          const renamedAssets = bundle.assets.map((asset) => ({
            ...asset,
            id: assetIdMap.get(asset.id)!,
          }));
"""
          new = """      const assetIdMap = new Map(bundle.assets.map((asset) => [asset.id, generateId('asset')]));
          const referencedOriginalAssetIds = new Set(
            bundle.project.assets.map((entry) => entry.id).filter((id) => assetIdMap.has(id)),
          );
          const project = {
            ...bundle.project,
            // asset 本体（assets/*/asset.json）が無い entry は dangling になるため除外する
            id: generateId('project'),
            assets: bundle.project.assets
              .filter((entry) => referencedOriginalAssetIds.has(entry.id))
              .map((entry) => ({
                ...entry,
                id: assetIdMap.get(entry.id)!,
              })),
          };
          const renamedAssets = bundle.assets
            .filter((asset) => referencedOriginalAssetIds.has(asset.id))
            .map((asset) => ({
              ...asset,
              id: assetIdMap.get(asset.id)!,
            }));
"""
          if old not in text:
            raise SystemExit('HomeScreen remap block not found')
          text = text.replace(old, new, 1)
          old_condition = """        if (!newAssetId) {
                  return [];
                }
"""
          new_condition = """        if (!newAssetId || !referencedOriginalAssetIds.has(match[1])) {
                  return [];
                }
"""
          if old_condition not in text:
            raise SystemExit('HomeScreen blob filter block not found')
          home.write_text(text.replace(old_condition, new_condition, 1))

          editor = Path('src/features/editor/EditorScreen.tsx')
          text = editor.read_text()
          old = """    if (!ok) {
                return;
              }
              if (!beginEditorPersistentMutation()) {
                return;
              }
"""
          new = """    if (!ok) {
                return;
              }
              await history.waitForPending();
              if (!beginEditorPersistentMutation()) {
                return;
              }
"""
          if old not in text:
            raise SystemExit('EditorScreen delete sequencing block not found')
          editor.write_text(text.replace(old, new, 1))
          PY
      - name: Apply exact Prettier output
        run: |
          npx prettier --write \
            src/core/history/history.test.ts \
            src/core/history/history.ts \
            src/core/storage/autosave.test.ts \
            src/core/storage/autosave.ts \
            src/core/storage/projectStore.test.ts \
            src/core/storage/projectStore.ts \
            src/core/storage/recoveryTrash.test.ts \
            src/core/storage/snapshotStore.test.ts \
            src/core/storage/snapshotStore.ts \
            src/features/editor/EditorScreen.tsx \
            src/features/editor/editorMutationGuard.test.ts \
            src/features/home/HomeScreen.tsx
      - name: Commit targeted fixes and exact formatting
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core src/features
          git commit -m "fix: align import and delete persistence sequencing [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
      - run: npm run lint
      - run: npm run format:check
      - name: Run build and capture diagnostics
        shell: bash
        run: |
          set +e
          npm run build > build-diagnostics.log 2>&1
          status=$?
          cat build-diagnostics.log
          exit $status
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storage-blocker-build-diagnostics
          path: build-diagnostics.log
          if-no-files-found: ignore
          retention-days: 1
      - run: npm run test

  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - name: Upload Playwright failure details
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: storage-blocker-playwright-failure
          path: test-results
          if-no-files-found: ignore
          retention-days: 1
