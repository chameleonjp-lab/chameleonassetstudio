name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.scope.outputs.code }}
      e2e: ${{ steps.scope.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="${GITHUB_SHA}^"
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          code=false
          e2e=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "$file"

            case "$file" in
              *.md) ;;
              *) code=true ;;
            esac

            case "$file" in
              src/* | e2e/* | public/* | index.html | package.json | package-lock.json | playwright.config.* | vite.config.* | .github/workflows/*)
                e2e=true
                ;;
            esac
          done <<< "$changed_files"

          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"

  diagnose-raster-e2e:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/2d2-raster-foundation-ui'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run focused raster Canvas E2E
        id: focused
        shell: bash
        run: |
          set +e
          npx playwright test e2e/raster-canvas-ui.spec.ts --reporter=line 2>&1 | tee /tmp/raster-e2e.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raster-canvas-e2e-diagnostics
          path: |
            /tmp/raster-e2e.log
            test-results
            playwright-report
          if-no-files-found: ignore
      - name: Fail when focused E2E failed
        if: steps.focused.outputs.status != '0'
        run: exit 1

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test

  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
