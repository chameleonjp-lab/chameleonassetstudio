name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.scope.outputs.code }}
      e2e: ${{ steps.scope.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="${GITHUB_SHA}^"
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          code=false
          e2e=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "$file"

            case "$file" in
              *.md) ;;
              *) code=true ;;
            esac

            case "$file" in
              src/* | e2e/* | public/* | index.html | package.json | package-lock.json | playwright.config.* | vite.config.* | .github/workflows/*)
                e2e=true
                ;;
            esac
          done <<< "$changed_files"

          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"

  apply-alpha-repair-ui:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/2d2-layer-repair-alpha-trim'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply bounded Editor alpha repair patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/features/editor/EditorScreen.tsx')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one match, found {count}: {old[:120]!r}')
              text = text.replace(old, new, 1)

          replace_once(
              "import { assertImageBatchCount } from '../../core/input/inputSafety';\nimport {\n  imageOperationLabel as operationLabel,\n  type ImageOperation,\n} from '../../core/images/imageOperation';",
              "import { assertImageBatchCount } from '../../core/input/inputSafety';\nimport { type AlphaInspection } from '../../core/images/layerRepair';\nimport {\n  imageOperationLabel as operationLabel,\n  type ImageOperation,\n} from '../../core/images/imageOperation';",
          )
          replace_once(
              "import {\n  blobToPixelBuffer,\n  pixelBufferToBlob,\n  runImageOperation,\n} from '../../core/images/runOperation';",
              "import { runAlphaInspection } from '../../core/images/runAnalysis';\nimport {\n  blobToPixelBuffer,\n  pixelBufferToBlob,\n  runImageOperation,\n} from '../../core/images/runOperation';",
          )
          replace_once(
              "interface ImageProcessingState {\n  label: string;\n  progress: number;\n}\n",
              "interface ImageProcessingState {\n  label: string;\n  progress: number;\n}\n\ninterface AlphaInspectionState {\n  assetId: string;\n  layerId: string;\n  textureId: string;\n  result: AlphaInspection;\n}\n",
          )
          replace_once(
              "  const [outlineColor, setOutlineColor] = useState('#000000');\n  const [outlineThickness, setOutlineThickness] = useState(2);",
              "  const [outlineColor, setOutlineColor] = useState('#000000');\n  const [outlineThickness, setOutlineThickness] = useState(2);\n  const [alphaThreshold, setAlphaThreshold] = useState(0);\n  const [alphaInspection, setAlphaInspection] = useState<AlphaInspectionState | null>(null);\n  const [alphaInspecting, setAlphaInspecting] = useState(false);",
          )
          replace_once(
              "  const persistentMutationBlocked = historyState.isBusy || mutationBusy;",
              "  const persistentMutationBlocked = historyState.isBusy || mutationBusy || alphaInspecting;",
          )
          replace_once(
              "  const selectedTextureSize =\n    selectedAsset?.textures.find((texture) => texture.id === selectedLayer?.textureId)?.size ??\n    null;\n  const selectedAnimation =",
              "  const selectedTextureSize =\n    selectedAsset?.textures.find((texture) => texture.id === selectedLayer?.textureId)?.size ??\n    null;\n  const activeAlphaInspection =\n    alphaInspection &&\n    alphaInspection.assetId === selectedAsset?.id &&\n    alphaInspection.layerId === selectedLayer?.id &&\n    alphaInspection.textureId === selectedLayer?.textureId\n      ? alphaInspection.result\n      : null;\n  const selectedAnimation =",
          )
          replace_once(
              "    setPastePreviewPosition(null);\n    setTextDraft(null);\n  }, [selectedAssetId, selectedLayerId]);",
              "    setPastePreviewPosition(null);\n    setTextDraft(null);\n    setAlphaInspection(null);\n  }, [selectedAssetId, selectedLayerId]);",
          )
          replace_once(
              "      await commitPersistentMutationWithHistory({\n        apply: () => saveAssetRevisionAndApply(next, { putBlobs: [{ key, blob: afterBlob }] }),\n        history,\n        entry: {\n          label,\n          undo: async () => {\n            // textures を新しい配列にしてビットマップ再読込を促す\n            await saveAssetRevisionAndApply(\n              { ...before, textures: [...before.textures] },\n              { putBlobs: [{ key, blob: beforeBlob }] },\n            );\n          },\n          redo: async () => {\n            await saveAssetRevisionAndApply(\n              { ...next, textures: [...next.textures] },\n              { putBlobs: [{ key, blob: afterBlob }] },\n            );\n          },\n        },\n      });\n      return true;",
              "      await commitPersistentMutationWithHistory({\n        apply: () => saveAssetRevisionAndApply(next, { putBlobs: [{ key, blob: afterBlob }] }),\n        history,\n        entry: {\n          label,\n          undo: async () => {\n            // textures を新しい配列にしてビットマップ再読込を促す\n            await saveAssetRevisionAndApply(\n              { ...before, textures: [...before.textures] },\n              { putBlobs: [{ key, blob: beforeBlob }] },\n            );\n          },\n          redo: async () => {\n            await saveAssetRevisionAndApply(\n              { ...next, textures: [...next.textures] },\n              { putBlobs: [{ key, blob: afterBlob }] },\n            );\n          },\n        },\n      });\n      setAlphaInspection(null);\n      return true;",
          )
          replace_once(
              "  };\n\n  /**\n   * 復旧点から画像とアセットを復元する（2D-1B-STORAGE §C）。",
              "  };\n\n  const handleAlphaInspect = async () => {\n    if (!selectedAsset || !selectedLayer?.textureId) {\n      setEditorError('検査するレイヤーを選択してください。');\n      return;\n    }\n    const texture = selectedAsset.textures.find((entry) => entry.id === selectedLayer.textureId);\n    if (!texture) {\n      setEditorError('レイヤーが参照するテクスチャが見つかりません。');\n      return;\n    }\n    if (texture.kind !== 'edit') {\n      setEditorError('元画像（source）は検査対象にできません。編集用画像を選択してください。');\n      return;\n    }\n    if (persistentMutationBlocked || imageProcessing) {\n      return;\n    }\n\n    setEditorError(null);\n    setAlphaInspection(null);\n    setAlphaInspecting(true);\n    setImageProcessing({ label: '透明縁を検査', progress: 0 });\n    try {\n      const blob = await loadBlob(blobKeyFor(selectedAsset.id, texture.path));\n      if (!blob) {\n        throw new Error('編集用画像が見つかりません。');\n      }\n      const buffer = await blobToPixelBuffer(blob);\n      const result = await runAlphaInspection(buffer, alphaThreshold, (progress) =>\n        setImageProcessing({ label: '透明縁を検査', progress }),\n      );\n      setAlphaInspection({\n        assetId: selectedAsset.id,\n        layerId: selectedLayer.id,\n        textureId: texture.id,\n        result,\n      });\n    } catch (error) {\n      setEditorError(\n        `透明縁を検査できませんでした: ${error instanceof Error ? error.message : String(error)}`,\n      );\n    } finally {\n      setImageProcessing(null);\n      setAlphaInspecting(false);\n    }\n  };\n\n  const handleAlphaTrim = async () => {\n    if (!activeAlphaInspection?.bounds || !activeAlphaInspection.hasTransparentMargin) {\n      return;\n    }\n    const success = await applyImageEdit({ type: 'crop', rect: activeAlphaInspection.bounds });\n    if (success) {\n      setAlphaInspection(null);\n    }\n  };\n\n  /**\n   * 復旧点から画像とアセットを復元する（2D-1B-STORAGE §C）。",
          )
          replace_once(
              "                <label className=\"editor-field\">\n                  背景透過の許容量（0-100）",
              "                <fieldset className=\"editor-fieldset\">\n                  <legend>透明縁・トリミング</legend>\n                  <p className=\"editor-note\">\n                    alpha boundsを読み取り専用で検査します。結果は保存せず、トリミング時も選択layerの画像だけを変更します。Asset canvas、原点、アンカー、当たり判定は変更しません。\n                  </p>\n                  <label className=\"editor-field\">\n                    alphaしきい値（0-255）\n                    <input\n                      type=\"number\"\n                      aria-label=\"alphaしきい値\"\n                      min={0}\n                      max={255}\n                      step={1}\n                      value={alphaThreshold}\n                      onChange={(event) => {\n                        const next = Math.min(255, Math.max(0, Math.round(Number(event.target.value) || 0)));\n                        setAlphaThreshold(next);\n                        setAlphaInspection(null);\n                      }}\n                    />\n                  </label>\n                  <button\n                    type=\"button\"\n                    disabled={!!imageProcessing || persistentMutationBlocked}\n                    onClick={() => void handleAlphaInspect()}\n                  >\n                    透明縁を検査\n                  </button>\n                  {activeAlphaInspection && (\n                    <div aria-label=\"透明縁検査結果\" className=\"editor-repair-result\">\n                      {activeAlphaInspection.isEmpty || !activeAlphaInspection.bounds || !activeAlphaInspection.margins ? (\n                        <p role=\"alert\" className=\"editor-note\">\n                          しきい値を超える表示pixelがありません。トリミングできません。\n                        </p>\n                      ) : (\n                        <>\n                          <p className=\"editor-note\">\n                            表示範囲: x {activeAlphaInspection.bounds.x}, y {activeAlphaInspection.bounds.y}, {activeAlphaInspection.bounds.width} x {activeAlphaInspection.bounds.height}px\n                          </p>\n                          <p className=\"editor-note\">\n                            透明余白: 上 {activeAlphaInspection.margins.top}px / 右 {activeAlphaInspection.margins.right}px / 下 {activeAlphaInspection.margins.bottom}px / 左 {activeAlphaInspection.margins.left}px\n                          </p>\n                          <p role=\"status\" className=\"editor-note\">\n                            {activeAlphaInspection.hasTransparentMargin\n                              ? '透明縁があります。選択画像だけをトリミングできます。'\n                              : '透明縁はありません。現在の画像サイズが表示範囲と一致しています。'}\n                          </p>\n                          {Object.values(activeAlphaInspection.touchesEdge).some(Boolean) && (\n                            <p role=\"alert\" className=\"editor-note\">\n                              表示pixelが画像端に接しています。接している辺にはトリミング後も余白がありません。\n                            </p>\n                          )}\n                        </>\n                      )}\n                      <button\n                        type=\"button\"\n                        disabled={\n                          !activeAlphaInspection.bounds ||\n                          !activeAlphaInspection.hasTransparentMargin ||\n                          !!imageProcessing ||\n                          persistentMutationBlocked\n                        }\n                        onClick={() => void handleAlphaTrim()}\n                      >\n                        透明縁をトリミング\n                      </button>\n                    </div>\n                  )}\n                </fieldset>\n\n                <label className=\"editor-field\">\n                  背景透過の許容量（0-100）",
          )

          path.write_text(text)
          PY
      - run: npm ci
      - run: npx prettier --write src/core/images/layerRepair.ts src/core/images/layerRepair.test.ts src/core/images/runAnalysis.ts src/workers/imageAnalysis.worker.ts src/features/editor/EditorScreen.tsx
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - name: Commit verified integration and restore workflow
        shell: bash
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml src/core/images/layerRepair.ts src/core/images/layerRepair.test.ts src/core/images/runAnalysis.ts src/workers/imageAnalysis.worker.ts src/features/editor/EditorScreen.tsx
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: add alpha inspection and trim UI"
            git push origin HEAD:${{ github.head_ref }}
          fi

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test

  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
