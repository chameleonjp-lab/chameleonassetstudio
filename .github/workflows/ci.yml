name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.scope.outputs.code }}
      e2e: ${{ steps.scope.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="${GITHUB_SHA}^"
          fi
          changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          code=false
          e2e=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in *.md) ;; *) code=true ;; esac
            case "$file" in
              src/* | e2e/* | public/* | index.html | package.json | package-lock.json | playwright.config.* | vite.config.* | .github/workflows/*) e2e=true ;;
            esac
          done <<< "$changed_files"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"

  apply-layer-repair-editor:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/2d2-layer-repair-padding-resize'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: python3 scripts/apply_padding_resize_patch.py
      - run: npm ci
      - run: npx prettier --write src/core/images/layerRepair.ts src/core/images/layerRepair.test.ts src/core/images/imageOperation.ts src/core/images/imageOperation.test.ts src/features/editor/EditorScreen.tsx
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - name: Commit verified integration and restore workflow
        shell: bash
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm scripts/apply_padding_resize_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml src/core/images/layerRepair.ts src/core/images/layerRepair.test.ts src/core/images/imageOperation.ts src/core/images/imageOperation.test.ts src/features/editor/EditorScreen.tsx scripts/apply_padding_resize_patch.py
          git commit -m "feat: connect layer padding and resize controls"
          git push origin HEAD:${{ github.head_ref }}

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test

  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
