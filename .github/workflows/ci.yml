name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.scope.outputs.code }}
      e2e: ${{ steps.scope.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="${GITHUB_SHA}^"
          fi
          changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          code=false
          e2e=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "$file"
            case "$file" in *.md) ;; *) code=true ;; esac
            case "$file" in
              src/* | e2e/* | public/* | index.html | package.json | package-lock.json | playwright.config.* | vite.config.* | .github/workflows/*) e2e=true ;;
            esac
          done <<< "$changed_files"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"

  diagnose-palette-workflow-e2e:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/2d2-layer-repair-palette-workflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prettier --write e2e/layer-repair-palette-workflow.spec.ts
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      - name: Run focused E2E with log
        shell: bash
        run: |
          set -o pipefail
          npx playwright test e2e/layer-repair-palette-workflow.spec.ts 2>&1 | tee palette-e2e.log
      - name: Upload focused E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: palette-e2e-diagnostics
          path: |
            palette-e2e.log
            playwright-report
            test-results
          if-no-files-found: warn

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test

  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
