name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: classify-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.scope.outputs.code }}
      e2e: ${{ steps.scope.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            BASE_SHA="${GITHUB_SHA}^"
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")"
          code=false
          e2e=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "$file"

            case "$file" in
              *.md) ;;
              *) code=true ;;
            esac

            case "$file" in
              src/* | e2e/* | tools/h3/* | tools/pages/* | public/* | index.html | package.json | package-lock.json | playwright.config.* | vite.config.* | .github/workflows/*)
                e2e=true
                ;;
            esac
          done <<< "$changed_files"

          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test

  e2e:
    needs: changes
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
      - run: npm run measure:h3:chromium
      - name: Define the CI H3 publication window
        shell: bash
        run: |
          set -euo pipefail
          published_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          expires_at="$(date -u -d "$published_at + 24 hours" '+%Y-%m-%dT%H:%M:%SZ')"
          {
            echo "H3_PUBLISHED_AT=$published_at"
            echo "H3_EXPIRES_AT=$expires_at"
          } >> "$GITHUB_ENV"
      - name: Build the GitHub Pages layout
        env:
          APP_BASE_PATH: /chameleonassetstudio/
          H3_BASE_PATH: /chameleonassetstudio/h3/
        run: |
          npm run build:app
          npm run measure:h3:build
          npm run pages:assemble
      - name: Verify the application and H3 Pages routes
        env:
          APP_BASE_PATH: /chameleonassetstudio/
          PAGES_EXPECTED_H3_STATUS: open
          PAGES_EXPECTED_SOURCE_COMMIT: ${{ github.sha }}
        run: npm run pages:chromium
      - name: Assemble the closed H3 route
        env:
          PAGES_H3_SOURCE: tools/h3/closed
        run: npm run pages:assemble
      - name: Verify closing H3 keeps the application available
        env:
          APP_BASE_PATH: /chameleonassetstudio/
          PAGES_EXPECTED_H3_STATUS: closed
        run: npm run pages:chromium
