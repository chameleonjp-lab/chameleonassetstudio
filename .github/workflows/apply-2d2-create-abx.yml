name: Apply 2D-2 CREATE A+B+X

on:
  push:
    branches:
      - agent/2d2-create-abx-implementation

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/2d2-create-abx-implementation
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply accepted implementation
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/apply_create_abx.py
          python /tmp/apply_create_abx.py
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - name: Commit accepted implementation
        shell: bash
        run: |
          rm -f .github/workflows/apply-2d2-create-abx.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement accepted A+B+X create slice"
          git push origin HEAD:agent/2d2-create-abx-implementation
